<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Form | Strategic Strength</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZvcm0iLAogICJzaG9ydF9uYW1lIjogIkZvcm0iLAogICJzdGFydF91cmwiOiAiaW5kZXguaHRtbCIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiI0Y0RjFFQSIsCiAgInRoZW1lX2NvbG9yIjogIiM0QTVENEUiCn0=">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #F4F1EA; --clay: #E2725B; --moss: #4A5D4E; --text: #1A1A1A; 
            --border: rgba(0,0,0,0.1); --card: #FFFFFF;
            --mono: 'SF Mono', 'Fira Code', monospace; --serif: "Georgia", serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        
        h1 { font-family: var(--serif); font-size: 26px; font-weight: 300; margin: 0; }
        .num { font-family: var(--mono); font-weight: 600; }
        label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; margin: 15px 0 5px; opacity: 0.6; letter-spacing: 1px; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: white; display: none; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); padding-bottom: 20px; z-index: 1000; }
        nav.visible { display: flex; }
        .nav-item { background: none; border: none; opacity: 0.3; text-align: center; font-size: 9px; font-weight: 700; flex: 1; color: var(--text); transition: 0.2s; }
        .nav-item.active { opacity: 1; color: var(--moss); }

        /* Views */
        .view { display: none; flex-direction: column; height: 100vh; padding: 40px 20px 100px; overflow-y: auto; }
        .view.active { display: flex; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        
        /* Inputs */
        input, textarea, select { width: 100%; background: #F9F9F8; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: var(--mono); font-size: 14px; margin-bottom: 10px; }
        .btn { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 16px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; }
        .btn-moss { background: var(--moss); }

        /* Log Specifics */
        .ex-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .ex-content { display: none; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .ex-content.open { display: block; }
        .stepper { display: flex; align-items: center; gap: 5px; background: var(--bg); border-radius: 8px; padding: 4px; border: 1px solid var(--border); }
        .set-node { width: 42px; height: 42px; border-radius: 8px; background: #EEE; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 800; cursor: pointer; }
        .set-node.done { background: var(--moss); color: white; }

        /* Rest Timer */
        #timer-ov { display: none; position: fixed; inset: 0; background: var(--moss); color: white; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #t-val { font-family: var(--mono); font-size: 80px; }
    </style>
</head>
<body>

    <div id="timer-ov">
        <label style="color:white; opacity:0.8">Recovery Phase</label>
        <div id="t-val">01:30</div>
        <button class="btn" style="width:auto; background:white; color:var(--moss); padding: 12px 40px;" onclick="stopT()">Skip</button>
    </div>

    <div id="v-setup" class="view active">
        <div class="card" id="setup-card">
            <h1>Initial Set Up</h1>
            <div id="setup-content">
                <label>API Key</label>
                <input type="password" id="init-key" placeholder="Gemini API Key">
                <button class="btn" onclick="startOnboarding()">Begin Interview</button>
            </div>
        </div>
    </div>

    <div id="v-log" class="view">
        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:15px;">
            <h1 id="log-day-title">Workout</h1>
            <div id="log-clock" class="num" style="color:var(--clay)">00:00</div>
        </div>
        <div id="log-mount"></div>
        <button class="btn" style="background:none; color:var(--text); border:1px solid var(--border); margin-top:10px" onclick="logAddEx()">+ Add Exercise</button>
        <button class="btn btn-moss" style="margin-top:15px" onclick="completeWorkout()">Finish & Sync</button>
    </div>

    <div id="v-prog" class="view">
        <h1>Program</h1>
        <div id="prog-mount" style="margin-top:20px"></div>
    </div>

    <div id="v-stat" class="view">
        <h1>Progress</h1>
        <div class="card"><label>Strength Trends</label><div style="height:100px; display:flex; align-items:flex-end; gap:10px;" id="chart-mount"></div></div>
        <label>History</label>
        <div id="hist-mount"></div>
    </div>

    <div id="v-chat" class="view">
        <h1>Trainer</h1>
        <div id="chat-mount" style="flex:1; overflow-y:auto; padding: 15px 0;"></div>
        <div style="display:flex; gap:10px; background:white; padding:12px; border-radius:15px; border:1px solid var(--border)">
            <input type="text" id="chat-in" placeholder="Ask trainer..." style="border:none; background:none; margin:0">
            <button class="btn" style="width:50px; padding:0" onclick="sendChat()"><i data-lucide="send"></i></button>
        </div>
    </div>

    <div id="v-set" class="view">
        <h1>Settings</h1>
        <div id="settings-mount"></div>
    </div>

    <nav id="nav">
        <button class="nav-item active" onclick="tab('log', this)"><i data-lucide="clipboard-list"></i><br>Log</button>
        <button class="nav-item" onclick="tab('prog', this)"><i data-lucide="calendar"></i><br>Program</button>
        <button class="nav-item" onclick="tab('stat', this)"><i data-lucide="trending-up"></i><br>Progress</button>
        <button class="nav-item" onclick="tab('chat', this)"><i data-lucide="message-circle"></i><br>Trainer</button>
        <button class="nav-item" onclick="tab('set', this)"><i data-lucide="sliders"></i><br>Settings</button>
    </nav>

    <script>
        let APP = {
            settings: JSON.parse(localStorage.getItem('f_settings')) || { key: '', profile: {}, history: [] },
            program: JSON.parse(localStorage.getItem('f_program')) || [],
            active: JSON.parse(localStorage.getItem('f_active')) || null,
            timer: null,
            init: function() {
                if(this.settings.key) {
                    document.getElementById('v-setup').classList.remove('active');
                    document.getElementById('v-log').classList.add('active');
                    document.getElementById('nav').classList.add('visible');
                    this.renderAll();
                }
                lucide.createIcons();
            },
            renderAll: function() {
                this.renderLog();
                this.renderProg();
                this.renderSettings();
                this.renderProgress();
            }
        };

        // --- SETUP LOGIC ---
        async function startOnboarding() {
            const key = document.getElementById('init-key').value;
            if(!key) return;
            APP.settings.key = key;
            const mount = document.getElementById('setup-content');
            mount.innerHTML = `<div style="font-size:14px; opacity:0.7">The AI Trainer is preparing the interview...</div>`;
            
            // Initial call to start the setup dialogue
            const firstResponse = await aiTalk("Introduce yourself as the AI Trainer and ask me the first set of questions to build my Profile (Attributes, Goals, Equipment, Constraints).");
            mount.innerHTML = `
                <div style="font-size:14px; line-height:1.5; margin-bottom:15px;">${firstResponse.text}</div>
                <textarea id="ob-ans" placeholder="Your response..."></textarea>
                <button class="btn" onclick="continueOnboarding()">Submit</button>
            `;
        }

        async function continueOnboarding() {
            const ans = document.getElementById('ob-ans').value;
            const mount = document.getElementById('setup-content');
            const res = await aiTalk(ans + " (Continue the Profile build or, if you have enough info, generate the 4-8 week Program and Settings object now in JSON.)");
            
            if(res.cmd) {
                handleCommand(res.cmd);
                location.reload();
            } else {
                mount.innerHTML = `
                    <div style="font-size:14px; line-height:1.5; margin-bottom:15px;">${res.text}</div>
                    <textarea id="ob-ans" placeholder="Your response..."></textarea>
                    <button class="btn" onclick="continueOnboarding()">Submit</button>
                `;
            }
        }

        // --- LOG LOGIC ---
        function renderLog() {
            if(!APP.active && APP.program.length > 0) {
                const day = APP.program[0]; // Logic for rotation should go here
                APP.active = { name: day.name, exercises: JSON.parse(JSON.stringify(day.ex)), completed: {}, start: Date.now() };
                save();
            }
            if(!APP.active) return;
            document.getElementById('log-day-title').innerText = APP.active.name;
            document.getElementById('log-mount').innerHTML = APP.active.exercises.map((ex, i) => `
                <div class="card">
                    <div class="ex-header" onclick="this.nextElementSibling.classList.toggle('open')">
                        <div style="font-family:var(--serif); font-size:18px;">${ex.name}</div>
                        <div class="num" style="font-size:12px; opacity:0.5">${ex.s}x${ex.r} @ ${ex.w}kg</div>
                    </div>
                    <div class="ex-content">
                        <div style="display:flex; gap:10px; margin-bottom:15px">
                            <div class="stepper"><div onclick="adj(${i},'w',-2.5)">-</div><div class="num">${ex.w}kg</div><div onclick="adj(${i},'w',2.5)">+</div></div>
                            <div class="stepper"><div onclick="adj(${i},'r',-1)">-</div><div class="num">${ex.r}r</div><div onclick="adj(${i},'r',1)">+</div></div>
                            <input type="number" placeholder="RPE" style="width:60px; margin:0" onchange="APP.active.exercises[${i}].rpe = this.value; save();">
                        </div>
                        <div style="display:flex; gap:8px; flex-wrap:wrap">
                            ${Array(parseInt(ex.s)).fill(0).map((_, s) => `<div class="set-node ${APP.active.completed[i+'-'+s]?'done':''}" onclick="markSet(${i},${s},${ex.rest || 90})">${s+1}</div>`).join('')}
                            <div class="set-node" style="border:1px dashed #ccc; background:none" onclick="adj(${i},'s',1)">+</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function adj(i, k, v) { APP.active.exercises[i][k] += v; save(); renderLog(); }
        function markSet(i, s, rest) {
            const id = i+'-'+s;
            APP.active.completed[id] = !APP.active.completed[id];
            if(APP.active.completed[id]) startRest(rest);
            save(); renderLog();
        }

        function startRest(sec) {
            document.getElementById('timer-ov').style.display = 'flex';
            let l = sec; clearInterval(APP.timer);
            APP.timer = setInterval(() => {
                l--; document.getElementById('t-val').innerText = `${Math.floor(l/60)}:${l%60<10?'0':''}${l%60}`;
                if(l<=0) stopT();
            }, 1000);
        }
        function stopT() { clearInterval(APP.timer); document.getElementById('timer-ov').style.display = 'none'; }

        async function completeWorkout() {
            const duration = Math.floor((Date.now() - APP.active.start)/60000);
            APP.settings.history.push({ ...APP.active, end: Date.now(), duration });
            tab('chat', document.querySelector('[onclick*="chat"]'));
            await sendChat(`Workout Complete: ${APP.active.name}. Duration: ${duration} mins. Data: ${JSON.stringify(APP.active)}. Unilaterally adjust the Program if needed.`);
            APP.active = null; save(); location.reload();
        }

        // --- CORE UTILS ---
        function save() {
            localStorage.setItem('f_settings', JSON.stringify(APP.settings));
            localStorage.setItem('f_program', JSON.stringify(APP.program));
            localStorage.setItem('f_active', JSON.stringify(APP.active));
        }

        async function aiTalk(msg) {
            const prompt = `System: You are the AI Trainer. Terminology: Trainee, Profile, Set Up, Program, Log, Progress, Settings. 
            Commands: COMMAND: {"type":"SET_PROG", "data":[]} or {"type":"SET_PROFILE", "data":{}}. 
            Current Profile: ${JSON.stringify(APP.settings.profile)}. Current Program: ${JSON.stringify(APP.program)}.`;
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${APP.settings.key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt + " Trainee: " + msg }] }] })
            });
            const d = await res.json();
            const raw = d.candidates[0].content.parts[0].text;
            return { text: raw.split('COMMAND:')[0], cmd: raw.includes('COMMAND:') ? JSON.parse(raw.split('COMMAND:')[1].trim()) : null };
        }

        function handleCommand(cmd) {
            if(cmd.type === "SET_PROG") APP.program = cmd.data;
            if(cmd.type === "SET_PROFILE") APP.settings.profile = cmd.data;
            save();
        }

        async function sendChat() {
            const inp = document.getElementById('chat-in');
            const m = inp.value; if(!m) return;
            const mount = document.getElementById('chat-mount');
            mount.innerHTML += `<div style="text-align:right; margin:10px 0; opacity:0.5; font-size:12px;">${m}</div>`;
            inp.value = '';
            const res = await aiTalk(m);
            mount.innerHTML += `<div class="card" style="font-size:14px; line-height:1.5;">${res.text}</div>`;
            if(res.cmd) handleCommand(res.cmd);
            mount.scrollTop = mount.scrollHeight;
        }

        function renderProg() {
            document.getElementById('prog-mount').innerHTML = APP.program.map(day => `
                <div class="card">
                    <div style="font-family:var(--serif); font-size:18px; color:var(--moss)">${day.name}</div>
                    ${day.ex.map(ex => `<div style="display:flex; justify-content:space-between; padding:8px 0; font-size:13px; border-bottom:1px solid #f0f0f0;"><span>${ex.name}</span><span class="num">${ex.s}x${ex.r} @ ${ex.w}kg</span></div>`).join('')}
                </div>
            `).join('');
        }

        function renderSettings() {
            document.getElementById('settings-mount').innerHTML = `
                <div class="card">
                    <label>Profile Attributes</label>
                    <textarea onchange="APP.settings.profile = JSON.parse(this.value); save();" style="height:150px">${JSON.stringify(APP.settings.profile, null, 2)}</textarea>
                    <label>API Key</label>
                    <input type="password" value="${APP.settings.key}" onchange="APP.settings.key = this.value; save();">
                    <button class="btn" style="background:var(--clay)" onclick="localStorage.clear(); location.reload();">Hard Reset System</button>
                </div>
            `;
        }

        function renderProgress() {
            const history = APP.settings.history;
            document.getElementById('hist-mount').innerHTML = history.reverse().map(h => `
                <div class="card" style="font-size:12px;">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>${h.name}</span><span>${new Date(h.end).toLocaleDateString()}</span></div>
                    <div style="opacity:0.6">${h.duration} mins total</div>
                </div>
            `).join('');
        }

        function tab(t, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-'+t).classList.add('active');
            el.classList.add('active');
            APP.renderAll();
        }

        APP.init();
    </script>
</body>
</html>
