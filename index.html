<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Vis</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #F4F1EA; --clay: #E2725B; --moss: #4A5D4E; --text: #1A1A1A; 
            --glass: rgba(255, 255, 255, 0.5); --border: rgba(0, 0, 0, 0.05);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; background: var(--bg); 
            color: var(--text); margin: 0; height: 100vh; overflow: hidden; 
        }

        /* View State */
        .view { display: none; flex-direction: column; height: 100vh; width: 100vw; padding: 60px 25px 100px; overflow-y: auto; }
        .view.active { display: flex; }

        /* Typography & UI */
        header { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.4; margin-bottom: 30px; text-align: center; font-weight: 700; }
        .card { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-radius: 35px; padding: 30px; margin-bottom: 20px; border: 1px solid var(--border); }
        h1 { font-size: 24px; font-weight: 300; margin: 0 0 10px; letter-spacing: -0.5px; }
        
        /* Onboarding Components */
        .step { display: none; }
        .step.active { display: block; }
        input, select, textarea { 
            width: 100%; background: rgba(0,0,0,0.03); border: none; border-radius: 20px; 
            padding: 20px; font-size: 16px; margin-bottom: 15px; font-family: inherit;
        }
        .btn-prime { 
            width: 100%; background: var(--text); color: var(--bg); border: none; 
            padding: 22px; border-radius: 25px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; 
        }

        /* Dashboard/Program */
        .badge-row { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .badge { font-size: 9px; font-weight: 700; padding: 6px 12px; border: 1px solid var(--text); border-radius: 15px; text-transform: uppercase; opacity: 0.4; }
        .badge.active { opacity: 1; background: var(--text); color: var(--bg); }
        
        .ex-row { display: flex; justify-content: space-between; align-items: center; padding: 22px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .ex-row h3 { font-size: 17px; font-weight: 400; margin: 0; }
        .ex-row p { font-size: 11px; opacity: 0.4; margin: 5px 0 0; text-transform: uppercase; }

        /* Training Logger */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 40px 0; }
        .stat-col { text-align: center; }
        .val { font-size: 44px; font-weight: 200; line-height: 1; }
        .unit { font-size: 9px; opacity: 0.3; text-transform: uppercase; margin-top: 8px; letter-spacing: 1px; }
        .adj-btn { background: none; border: 1px solid rgba(0,0,0,0.06); width: 40px; height: 40px; border-radius: 50%; font-size: 18px; margin: 12px auto; display: flex; align-items: center; justify-content: center; }

        /* The Action Circle */
        .log-area { position: relative; height: 160px; display: flex; align-items: center; justify-content: center; margin-top: 20px; }
        .circle-btn { width: 140px; height: 140px; background: var(--clay); border: none; border-radius: 70px; color: white; font-weight: 700; font-size: 14px; letter-spacing: 1px; z-index: 10; transition: transform 0.2s; }
        .circle-btn:active { transform: scale(0.95); }
        #timer-display { display: none; font-size: 72px; font-weight: 100; color: var(--clay); letter-spacing: -3px; }

        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; height: 95px; background: var(--bg); display: none; justify-content: space-around; align-items: center; padding-bottom: 30px; border-top: 1px solid rgba(0,0,0,0.02); }
        nav.visible { display: flex; }
        .n-item { background: none; border: none; opacity: 0.2; padding: 20px; transition: 0.3s; }
        .n-item.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="v-setup" class="view active">
        <header>The Deep Dive</header>
        <div class="card">
            <div id="step1" class="step active">
                <h1>Identity</h1>
                <p style="opacity:0.4; font-size:13px; margin-bottom:20px;">Experience, Goals, and Training Frequency.</p>
                <select id="set-exp"><option>Experienced (10+ years)</option><option>Intermediate (3-5 years)</option><option>Novice</option></select>
                <textarea id="set-goals" placeholder="Primary Focus (e.g., Hypertrophy, 95kg Bench goal, Strength)..."></textarea>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="set-freq" placeholder="Days/Week">
                    <input type="number" id="set-time" placeholder="Mins/Session">
                </div>
                <button class="btn-prime" onclick="go(2)">Next</button>
            </div>
            <div id="step2" class="step">
                <h1>Constraints</h1>
                <p style="opacity:0.4; font-size:13px; margin-bottom:20px;">Physical health and injury history.</p>
                <textarea id="set-health" placeholder="e.g., Lower back sensitivity, shoulder impingement..."></textarea>
                <button class="btn-prime" onclick="go(3)">Next</button>
            </div>
            <div id="step3" class="step">
                <h1>Profiles</h1>
                <p style="opacity:0.4; font-size:13px; margin-bottom:20px;">Equipment for Home vs. Gym.</p>
                <textarea id="set-gym" placeholder="Gym: Full Rack, Cables, Leg Press..."></textarea>
                <textarea id="set-home" placeholder="Home: Dumbbells (up to 30kg), Bench, Bands..."></textarea>
                <button class="btn-prime" onclick="finish()">Initialize Vis</button>
            </div>
        </div>
    </div>

    <div id="v-dash" class="view">
        <div class="badge-row">
            <div id="b-gym" class="badge active" onclick="setProfile('Gym')">Gym</div>
            <div id="b-home" class="badge" onclick="setProfile('Home')">Home</div>
        </div>
        <header>Today's Session</header>
        <div class="card" id="program-view"></div>
        <button class="btn-prime" onclick="addEx()" style="background:none; color:var(--text); border:1px solid rgba(0,0,0,0.1);">+ Add Exercise</button>
    </div>

    <div id="v-train" class="view">
        <header id="set-status">Ready</header>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2 id="active-name" style="font-size:22px; font-weight:300; margin:0;">Bench Press</h2>
                <button onclick="aiSwap()" style="background:none; border:none; opacity:0.2;"><i data-lucide="refresh-cw" size="18"></i></button>
            </div>

            <div class="stats-grid">
                <div class="stat-col">
                    <button class="adj-btn" onclick="adj('w', 2.5)">+</button>
                    <div class="val" id="w-v">95</div><div class="unit">kg</div>
                    <button class="adj-btn" onclick="adj('w', -2.5)">-</button>
                </div>
                <div class="stat-col">
                    <button class="adj-btn" onclick="adj('r', 1)">+</button>
                    <div class="val" id="r-v">8</div><div class="unit">reps</div>
                    <button class="adj-btn" onclick="adj('r', -1)">-</button>
                </div>
                <div class="stat-col">
                    <button class="adj-btn" onclick="adj('e', 0.5)">+</button>
                    <div class="val" id="e-v">8.0</div><div class="unit">RPE</div>
                    <button class="adj-btn" onclick="adj('e', -0.5)">-</button>
                </div>
            </div>

            <div class="log-area">
                <button class="circle-btn" id="log-trigger" onclick="logSet()">LOG SET</button>
                <div id="timer-display">90</div>
            </div>
            
            <div id="coach-hint" style="text-align:center; margin-top:30px; font-size:10px; opacity:0.3; letter-spacing:1.5px; text-transform:uppercase; line-height:1.6;">Awaiting First Set</div>
        </div>
    </div>

    <div id="v-sys" class="view">
        <header>System Settings</header>
        <div class="card">
            <label style="font-size:9px; font-weight:700; opacity:0.4; letter-spacing:1px;">GEMINI API KEY</label>
            <input type="password" id="key-input" style="background:none; border-bottom:1px solid rgba(0,0,0,0.1); border-radius:0; padding:15px 0;">
            <button class="btn-prime" onclick="saveKey()">Update Config</button>
            <button onclick="wipe()" style="margin-top:60px; background:none; border:none; color:red; opacity:0.2; width:100%; font-size:11px; font-weight:700;">WIPE PERSISTENT DATA</button>
        </div>
    </div>

    <nav id="main-nav">
        <button class="n-item" onclick="tab('dash', this)"><i data-lucide="layout-grid"></i></button>
        <button class="n-item active" onclick="tab('train', this)"><i data-lucide="dumbbell"></i></button>
        <button class="n-item" onclick="tab('sys', this)"><i data-lucide="settings"></i></button>
    </nav>

    <script>
        // --- RELATIONAL STATE ENGINE ---
        let db = {
            key: localStorage.getItem('v_key'),
            init: localStorage.getItem('v_init') === 'true',
            profile: localStorage.getItem('v_profile') || 'Gym',
            identity: {
                level: localStorage.getItem('v_level'),
                goals: localStorage.getItem('v_goals'),
                health: localStorage.getItem('v_health'),
                gym: localStorage.getItem('v_gym'),
                home: localStorage.getItem('v_home')
            },
            program: JSON.parse(localStorage.getItem('v_prog')) || [
                { name: 'Bench Press', target: '95kg x 8' },
                { name: 'Lat Pulldown', target: '70kg x 12' },
                { name: 'Bulgarian Split Squat', target: '20kg x 10' }
            ]
        };

        function init() {
            if (db.init) {
                document.getElementById('v-setup').classList.remove('active');
                document.getElementById('v-train').classList.add('active');
                document.getElementById('main-nav').classList.add('visible');
                document.getElementById('key-input').value = db.key;
                setProfile(db.profile);
                renderProgram();
            }
            lucide.createIcons();
        }

        function go(s) {
            document.querySelectorAll('.step').forEach(x => x.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
        }

        function finish() {
            db.key = db.key || prompt("Paste Gemini API Key:");
            localStorage.setItem('v_key', db.key);
            localStorage.setItem('v_level', document.getElementById('set-exp').value);
            localStorage.setItem('v_goals', document.getElementById('set-goals').value);
            localStorage.setItem('v_health', document.getElementById('set-health').value);
            localStorage.setItem('v_gym', document.getElementById('set-gym').value);
            localStorage.setItem('v_home', document.getElementById('set-home').value);
            localStorage.setItem('v_init', 'true');
            localStorage.setItem('v_prog', JSON.stringify(db.program));
            location.reload();
        }

        function tab(v, b) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.n-item').forEach(x => x.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            b.classList.add('active');
        }

        function setProfile(p) {
            db.profile = p;
            localStorage.setItem('v_profile', p);
            document.querySelectorAll('.badge').forEach(b => b.classList.remove('active'));
            document.getElementById('b-' + p.toLowerCase()).classList.add('active');
        }

        // --- CORE LOGIC ---
        function adj(t, n) {
            let el = document.getElementById(t + '-v');
            el.innerText = (parseFloat(el.innerText) + n).toFixed(1).replace('.0', '');
        }

        async function ai(p) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${db.key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
            });
            const json = await res.json();
            return JSON.parse(json.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
        }

        async function logSet() {
            const btn = document.getElementById('log-trigger');
            const timer = document.getElementById('timer-display');
            const hint = document.getElementById('coach-hint');
            btn.style.display = 'none'; timer.style.display = 'block'; hint.innerText = "COACH ANALYIZING FATIGUE...";

            let s = 90;
            const clock = setInterval(() => {
                s--; timer.innerText = s;
                if(s <= 0) { clearInterval(clock); btn.style.display = 'block'; timer.style.display = 'none'; timer.innerText = 90; }
            }, 1000);

            const w = document.getElementById('w-v').innerText;
            const r = document.getElementById('r-v').innerText;
            const e = document.getElementById('e-v').innerText;
            
            const prompt = `User 42yo, 10yr exp. Goal: ${db.identity.goals}. Health: ${db.identity.health}. Logged ${w}kg x ${r} @ RPE ${e}. Next set? JSON: {"w":float, "r":int, "msg":"string"}`;
            
            try {
                const res = await ai(prompt);
                hint.innerText = res.msg.toUpperCase();
                document.getElementById('set-status').innerText = `NEXT: ${res.w}kg x ${res.r}`;
            } catch(ex) { hint.innerText = "CONNECTION LOST"; }
        }

        async function aiSwap() {
            const cur = document.getElementById('active-name').innerText;
            const eq = db.profile === 'Gym' ? db.identity.gym : db.identity.home;
            const p = `Swap ${cur}. Equip: ${eq}. Health: ${db.identity.health}. JSON: {"n":"string"}`;
            try {
                const res = await ai(p);
                document.getElementById('active-name').innerText = res.n;
            } catch(ex) {}
        }

        function renderProgram() {
            const list = document.getElementById('program-view');
            list.innerHTML = db.program.map((ex, i) => `
                <div class="ex-row" onclick="loadEx(${i})">
                    <div><h3>${ex.name}</h3><p>${ex.target}</p></div>
                    <i data-lucide="chevron-right" size="14" style="opacity:0.2"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function loadEx(i) {
            const ex = db.program[i];
            document.getElementById('active-name').innerText = ex.name;
            document.getElementById('w-v').innerText = ex.target.split('kg')[0];
            tab('train', document.querySelectorAll('.n-item')[1]);
        }

        function saveKey() { localStorage.setItem('v_key', document.getElementById('key-input').value); location.reload(); }
        function wipe() { localStorage.clear(); location.reload(); }

        init();
    </script>
</body>
</html>
