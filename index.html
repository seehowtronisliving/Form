<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Form</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #F4F1EA; --clay: #E2725B; --moss: #4A5D4E; --text: #1A1A1A;
            --glass: rgba(255, 255, 255, 0.8); --border: rgba(0, 0, 0, 0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }

        /* --- LAYOUT --- */
        .view { display: none; flex-direction: column; height: 100vh; padding: 40px 20px 100px; overflow-y: auto; }
        .view.active { display: flex; animation: fadeIn 0.3s ease; }
        header { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; margin-bottom: 30px; text-align: center; font-weight: 800; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); }

        /* --- UI ELEMENTS --- */
        h1 { font-size: 28px; font-weight: 300; margin: 0 0 10px; letter-spacing: -1px; }
        label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; margin: 15px 0 5px; opacity: 0.6; }
        select, input, textarea { width: 100%; background: rgba(0,0,0,0.05); border: 1px solid transparent; border-radius: 15px; padding: 18px; font-size: 16px; margin-bottom: 5px; font-family: inherit; }
        .btn-prime { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 22px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; margin-top: 10px; }

        /* --- WORKOUT UI --- */
        .ex-card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .stat-box { text-align: center; background: var(--bg); border-radius: 15px; padding: 10px 5px; }
        .stat-val { font-size: 24px; font-weight: 200; display: block; }
        .stat-unit { font-size: 8px; font-weight: 800; opacity: 0.4; text-transform: uppercase; }
        .stepper { background: white; border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 5px auto; cursor: pointer; }

        /* --- NAVIGATION --- */
        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: var(--bg); display: none; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); padding-bottom: 20px; z-index: 100; }
        nav.visible { display: flex; }
        .n-btn { background: none; border: none; opacity: 0.3; transition: 0.3s; }
        .n-btn.active { opacity: 1; color: var(--moss); }

        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 241, 234, 0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div style="width: 40px; height: 40px; border: 3px solid var(--moss); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-top: 20px;">Strategic AI Consulting...</p>
    </div>

    <div id="v-onboard" class="view active">
        <header>Initialize System</header>
        <div class="card" id="step-1">
            <h1>Identity</h1>
            <label>Biological Sex</label>
            <select id="in-sex"><option>Male</option><option>Female</option><option>Other</option></select>
            <label>Experience</label>
            <select id="in-exp">
                <option value="none">None</option>
                <option value="some">Some Experience</option>
                <option value="very">Very Experienced</option>
                <option value="expert">Expert / Elite</option>
            </select>
            <button class="btn-prime" onclick="showStep(2)">Next</button>
        </div>
        <div class="card" id="step-2" style="display:none">
            <h1>Goals</h1>
            <label>Primary Focus</label>
            <select id="in-goal">
                <option>Hypertrophy (Muscle Growth)</option>
                <option>Pure Strength (Powerlifting)</option>
                <option>General Fitness</option>
                <option>Longevity / Health</option>
            </select>
            <label>Strength Benchmarks (1RM kg)</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="in-sq" placeholder="Squat">
                <input type="number" id="in-bp" placeholder="Bench">
                <input type="number" id="in-dl" placeholder="Deadlift">
                <input type="number" id="in-oh" placeholder="Press">
            </div>
            <button class="btn-prime" onclick="showStep(3)">Next</button>
        </div>
        <div class="card" id="step-3" style="display:none">
            <h1>Parameters</h1>
            <label>Frequency (Days/Wk)</label>
            <select id="in-freq"><option>2</option><option selected>3</option><option>4</option><option>5</option></select>
            <label>Duration (Mins)</label>
            <select id="in-dur"><option>30</option><option selected>45</option><option>60</option><option>90</option></select>
            <label>Environment / Constraints</label>
            <textarea id="in-notes" placeholder="e.g. Home gym, dumbbells only, no rack..."></textarea>
            <button class="btn-prime" onclick="setupComplete()">Generate Program</button>
        </div>
    </div>

    <div id="v-train" class="view">
        <header id="w-header">Active Session</header>
        <div id="w-container"></div>
        <button class="btn-prime" style="background:var(--moss)" onclick="runReview()">Complete & Review</button>
    </div>

    <div id="v-settings" class="view">
        <header>Configuration</header>
        <div class="card" id="settings-info"></div>
        <div class="card">
            <label>Gemini API Key</label>
            <input type="password" id="api-key-input" placeholder="Paste Key">
            <button class="btn-prime" onclick="saveApiKey()">Save System Key</button>
        </div>
        <button class="btn-prime" onclick="if(confirm('Wipe system?')) { localStorage.clear(); location.reload(); }" style="background:none; color:red; border:1px solid red;">Wipe All Data</button>
    </div>

    <nav id="nav">
        <button class="n-btn active" onclick="navTab('train', this)"><i data-lucide="dumbbell"></i></button>
        <button class="n-btn" onclick="navTab('settings', this)"><i data-lucide="sliders"></i></button>
    </nav>

    <script>
        const STORE = { get: (k) => JSON.parse(localStorage.getItem(k)), set: (k, v) => localStorage.setItem(k, JSON.stringify(v)) };
        let state = { profile: STORE.get('f_profile'), apiKey: STORE.get('f_key'), program: STORE.get('f_program') || [] };

        function init() {
            if (state.profile && state.program.length > 0) {
                document.getElementById('v-onboard').classList.remove('active');
                document.getElementById('v-train').classList.add('active');
                document.getElementById('nav').classList.add('visible');
                renderWorkout();
                renderSettings();
            }
            lucide.createIcons();
        }

        function showStep(s) {
            ['step-1', 'step-2', 'step-3'].forEach((id, i) => document.getElementById(id).style.display = (i + 1 === s) ? 'block' : 'none');
        }

        async function setupComplete() {
            state.profile = {
                sex: document.getElementById('in-sex').value, exp: document.getElementById('in-exp').value,
                goal: document.getElementById('in-goal').value, benchmarks: { sq: document.getElementById('in-sq').value || 40, bp: document.getElementById('in-bp').value || 30 },
                params: { freq: document.getElementById('in-freq').value, dur: document.getElementById('in-dur').value }, notes: document.getElementById('in-notes').value
            };
            STORE.set('f_profile', state.profile);
            toggleLoader(true);
            if (state.apiKey) { await fetchGeminiProgram(state.profile); } 
            else { state.program = [{ name: "Squat", weight: state.profile.benchmarks.sq, reps: 5, sets: 3 }, { name: "Bench", weight: state.profile.benchmarks.bp, reps: 5, sets: 3 }]; STORE.set('f_program', state.program); }
            location.reload();
        }

        async function fetchGeminiProgram(p) {
            const prompt = `Coach Mode. User: ${p.sex}, ${p.exp} level, goal: ${p.goal}. Bench: SQ ${p.benchmarks.sq}kg, BP ${p.benchmarks.bp}kg. Equipment: ${p.notes}. Return ONLY a JSON array of 3 objects like: [{"name":"Exercise", "weight": 50, "reps": 5, "sets": 3}]`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                const text = d.candidates[0].content.parts[0].text;
                state.program = JSON.parse(text.substring(text.indexOf('['), text.lastIndexOf(']') + 1));
                STORE.set('f_program', state.program);
            } catch (e) { console.error(e); }
        }

        async function runReview() {
            toggleLoader(true);
            if (!state.apiKey) {
                state.program = state.program.map(ex => ({ ...ex, weight: parseFloat(ex.weight) + 2.5 }));
                STORE.set('f_program', state.program);
                location.reload(); return;
            }
            const prompt = `Review Session: ${JSON.stringify(state.program)}. Goal: ${state.profile.goal}. Provide modified JSON array for NEXT session with +2.5kg increases where RPE was low. JSON ONLY.`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                const text = d.candidates[0].content.parts[0].text;
                state.program = JSON.parse(text.substring(text.indexOf('['), text.lastIndexOf(']') + 1));
                STORE.set('f_program', state.program);
                location.reload();
            } catch (e) { toggleLoader(false); alert("Review Failed."); }
        }

        function renderWorkout() {
            document.getElementById('w-container').innerHTML = state.program.map((ex, i) => `
                <div class="ex-card">
                    <div style="font-weight:600; margin-bottom:10px;">${ex.name}</div>
                    <div class="stat-grid">
                        <div class="stat-box"><div class="stepper" onclick="adj(${i},'weight',2.5)">+</div><span class="stat-val" id="w-${i}">${ex.weight}</span><span class="stat-unit">kg</span></div>
                        <div class="stat-box"><div class="stepper" onclick="adj(${i},'reps',1)">+</div><span class="stat-val" id="r-${i}">${ex.reps}</span><span class="stat-unit">reps</span></div>
                        <div class="stat-box"><div class="stepper" onclick="adj(${i},'rpe',0.5)">+</div><span class="stat-val" id="e-${i}">7</span><span class="stat-unit">RPE</span></div>
                    </div>
                </div>
            `).join('');
        }

        function adj(i, k, v) { 
            const el = document.getElementById((k === 'weight' ? 'w-' : k === 'reps' ? 'r-' : 'e-') + i);
            el.innerText = (parseFloat(el.innerText) + v).toFixed(v % 1 === 0 ? 0 : 1);
            state.program[i][k] = parseFloat(el.innerText);
        }

        function navTab(v, btn) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            btn.classList.add('active');
        }

        function renderSettings() {
            document.getElementById('settings-info').innerHTML = `<label>Current Profile</label><p>${state.profile.sex} • ${state.profile.exp} • ${state.profile.goal}</p>`;
            document.getElementById('api-key-input').value = state.apiKey || '';
        }

        function saveApiKey() { STORE.set('f_key', document.getElementById('api-key-input').value); location.reload(); }
        function toggleLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

        init();
    </script>
</body>
</html>
