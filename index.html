<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Form</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #F4F1EA; --clay: #E2725B; --moss: #4A5D4E; --text: #1A1A1A; 
            --glass: rgba(255, 255, 255, 0.7); --border: rgba(0, 0, 0, 0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        .view { display: none; flex-direction: column; height: 100vh; width: 100vw; padding: 40px 25px 120px; overflow-y: auto; }
        .view.active { display: flex; animation: fadeIn 0.3s ease; }
        header { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; margin-bottom: 30px; text-align: center; font-weight: 800; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); }
        h1 { font-size: 28px; font-weight: 300; margin: 0 0 10px; letter-spacing: -1px; }
        .sub { font-size: 13px; opacity: 0.5; margin-bottom: 20px; }
        label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; opacity: 0.6; }
        select, input, textarea { width: 100%; background: rgba(0,0,0,0.04); border-radius: 15px; padding: 18px; font-size: 16px; border: 1px solid transparent; margin-bottom: 20px; font-family: inherit; }
        .btn-prime { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 22px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        
        /* Stats & Timer */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-box { text-align: center; }
        .stat-val { font-size: 32px; font-weight: 200; }
        .stat-unit { font-size: 8px; font-weight: 800; text-transform: uppercase; opacity: 0.4; }
        .stepper { background: white; border: 1px solid var(--border); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 5px auto; }

        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(244, 241, 234, 0.9); backdrop-filter: blur(10px); display: none; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
        nav.visible { display: flex; }
        .n-btn { background: none; border: none; opacity: 0.3; padding: 20px; }
        .n-btn.active { opacity: 1; color: var(--moss); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="v-onboard" class="view active">
        <header>Initialize Form</header>
        <div class="card">
            <div id="step1" class="step active">
                <h1>Identity</h1>
                <label>Biological Sex</label>
                <select id="in-sex"><option>Male</option><option>Female</option><option>Other</option></select>
                <label>Training Experience</label>
                <select id="in-exp">
                    <option value="none">None (Beginner)</option>
                    <option value="some">Some Experience</option>
                    <option value="very">Very Experienced</option>
                    <option value="expert">Expert (Elite)</option>
                </select>
                <button class="btn-prime" onclick="nextStep(2)">Next</button>
            </div>
            <div id="step2" class="step">
                <h1>Goals</h1>
                <label>Primary Focus</label>
                <select id="in-goal-type">
                    <option>Hypertrophy (Muscle Growth)</option>
                    <option>Strength (Powerlifting Style)</option>
                    <option>General Fitness / Health</option>
                    <option>Longevity / Mobility</option>
                </select>
                <label>Optional: Estimated 1RM (kg)</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="number" id="br-sq" placeholder="Squat">
                    <input type="number" id="br-bp" placeholder="Bench">
                </div>
                <button class="btn-prime" onclick="nextStep(3)">Next</button>
            </div>
            <div id="step3" class="step">
                <h1>Parameters</h1>
                <label>Frequency (Days/Week)</label>
                <select id="in-freq"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option><option>6</option></select>
                <label>Session Duration (Mins)</label>
                <select id="in-dur"><option>15</option><option>30</option><option selected>45</option><option>60</option><option>90</option></select>
                <label>Equipment Availability</label>
                <textarea id="in-equip" placeholder="Describe your gym/home setup..."></textarea>
                <button class="btn-prime" onclick="completeOnboarding()">Generate Program</button>
            </div>
        </div>
    </div>

    <div id="v-train" class="view">
        <header id="workout-label">Active Session</header>
        <div id="workout-container">
            <div class="card">
                <h2 id="ex-name" style="font-weight:300; text-align:center;">Squat (Example)</h2>
                <div class="stat-grid">
                    <div class="stat-box"><div class="stepper" onclick="adj('w', 2.5)">+</div><div class="stat-val" id="val-w">60</div><div class="stat-unit">kg</div></div>
                    <div class="stat-box"><div class="stepper" onclick="adj('r', 1)">+</div><div class="stat-val" id="val-r">8</div><div class="stat-unit">reps</div></div>
                    <div class="stat-box"><div class="stepper" onclick="adj('e', 0.5)">+</div><div class="stat-val" id="val-e">7.0</div><div class="stat-unit">RPE</div></div>
                </div>
                <button class="btn-prime" onclick="logSet()">Log Set</button>
            </div>
        </div>
        <button class="btn-prime" style="background:var(--moss)" onclick="endSession()">End & Strategic Review</button>
    </div>

    <div id="v-settings" class="view">
        <header>System State</header>
        <div class="card" id="user-profile-data"></div>
        <div class="card">
            <label>API Key</label>
            <input type="password" id="api-key" placeholder="Enter Gemini Key">
            <button class="btn-prime" onclick="saveKey()">Save Config</button>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="color:red; background:none; border:none; width:100%; font-size:10px; font-weight:800;">WIPE DATA & RESTART</button>
    </div>

    <nav id="navbar">
        <button class="n-btn active" onclick="showTab('train', this)"><i data-lucide="dumbbell"></i></button>
        <button class="n-btn" onclick="showTab('settings', this)"><i data-lucide="sliders"></i></button>
    </nav>

    <script>
        let state = {
            profile: JSON.parse(localStorage.getItem('form_profile')) || null,
            apiKey: localStorage.getItem('form_key') || '',
            session: []
        };

        function init() {
            if (state.profile) {
                document.getElementById('v-onboard').classList.remove('active');
                document.getElementById('v-train').classList.add('active');
                document.getElementById('navbar').classList.add('visible');
                renderProfile();
            }
            lucide.createIcons();
        }

        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
        }

        function completeOnboarding() {
            state.profile = {
                sex: document.getElementById('in-sex').value,
                exp: document.getElementById('in-exp').value,
                goal: document.getElementById('in-goal-type').value,
                benchmarks: { sq: document.getElementById('br-sq').value, bp: document.getElementById('br-bp').value },
                params: { freq: document.getElementById('in-freq').value, dur: document.getElementById('in-dur').value },
                equip: document.getElementById('in-equip').value
            };
            localStorage.setItem('form_profile', JSON.stringify(state.profile));
            location.reload();
        }

        function adj(t, v) {
            let el = document.getElementById('val-'+t);
            let n = parseFloat(el.innerText) + v;
            el.innerText = n % 1 === 0 ? n : n.toFixed(1);
        }

        function showTab(t, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('v-'+t).classList.add('active');
            btn.classList.add('active');
        }

        function renderProfile() {
            const p = state.profile;
            document.getElementById('user-profile-data').innerHTML = `
                <p><b>Goal:</b> ${p.goal}</p>
                <p><b>Experience:</b> ${p.exp}</p>
                <p><b>Frequency:</b> ${p.params.freq} days/wk</p>
            `;
        }

        function saveKey() {
            localStorage.setItem('form_key', document.getElementById('api-key').value);
            alert("API Key Saved. The Coach is now active.");
        }

        init();
    </script>
</body>
</html>
