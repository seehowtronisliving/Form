<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Form</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #F4F1EA; --clay: #E2725B; --moss: #4A5D4E; --text: #1A1A1A; 
            --glass: rgba(255, 255, 255, 0.7); --border: rgba(0, 0, 0, 0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; 
        }

        /* --- LAYOUT --- */
        .view { display: none; flex-direction: column; height: 100vh; width: 100vw; padding: 60px 25px 120px; overflow-y: auto; }
        .view.active { display: flex; animation: fadeIn 0.4s ease; }
        header { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.4; margin-bottom: 40px; text-align: center; font-weight: 800; }
        .card { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-radius: 35px; padding: 30px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.02); }

        /* --- ONBOARDING --- */
        .step { display: none; }
        .step.active { display: block; }
        h1 { font-size: 32px; font-weight: 300; margin: 0 0 15px; letter-spacing: -1px; }
        p.sub { font-size: 14px; opacity: 0.5; margin-bottom: 30px; line-height: 1.5; }
        input, select, textarea { width: 100%; background: rgba(0,0,0,0.04); border-radius: 20px; padding: 22px; font-size: 16px; margin-bottom: 15px; border: 1px solid transparent; font-family: inherit; transition: 0.3s; }
        input:focus { background: white; border-color: var(--moss); }
        .btn-prime { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 24px; border-radius: 22px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px; cursor: pointer; }

        /* --- THE ENGINE --- */
        .badge-row { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .badge { font-size: 9px; font-weight: 800; padding: 10px 20px; border: 1.5px solid var(--text); border-radius: 25px; text-transform: uppercase; opacity: 0.2; cursor: pointer; transition: 0.3s; }
        .badge.active { opacity: 1; background: var(--text); color: var(--bg); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 30px 0; }
        .stat-box { text-align: center; }
        .stat-val { font-size: 42px; font-weight: 200; margin: 8px 0; letter-spacing: -1px; }
        .stat-unit { font-size: 9px; opacity: 0.4; text-transform: uppercase; font-weight: 700; }
        .stepper { background: white; border: 1px solid var(--border); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- CIRCLE TIMER --- */
        .circle-container { position: relative; width: 180px; height: 180px; margin: 25px auto; display: flex; align-items: center; justify-content: center; }
        .progress-svg { position: absolute; transform: rotate(-90deg); }
        .log-btn { width: 140px; height: 140px; background: var(--clay); border: none; border-radius: 50%; color: white; font-weight: 800; font-size: 13px; letter-spacing: 2px; z-index: 10; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .log-btn:active { transform: scale(0.92); }
        .timer-text { position: absolute; font-size: 48px; font-weight: 200; color: var(--clay); display: none; }

        /* --- TACTICAL CONTROLS --- */
        .tactical-row { display: flex; justify-content: space-around; margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; }
        .t-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.4; cursor: pointer; transition: 0.2s; }
        .t-btn:hover { opacity: 1; }
        .t-btn span { font-size: 9px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        /* --- NAV --- */
        nav { position: fixed; bottom: 0; width: 100%; height: 95px; background: rgba(244, 241, 234, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: none; justify-content: space-around; align-items: center; padding-bottom: 25px; border-top: 1px solid var(--border); z-index: 100; }
        nav.visible { display: flex; }
        .n-btn { background: none; border: none; opacity: 0.2; padding: 15px; transition: 0.4s; }
        .n-btn.active { opacity: 1; color: var(--moss); transform: translateY(-5px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="v-onboard" class="view active">
        <header>Constructing Form</header>
        <div class="card">
            <div id="step1" class="step active">
                <h1>Identity</h1>
                <p class="sub">Your biological starting point.</p>
                <input type="text" id="in-name" placeholder="Name">
                <input type="number" id="in-age" placeholder="Age">
                <input type="text" id="in-exp" placeholder="Experience (e
