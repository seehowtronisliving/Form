<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Vis</title>
    <style>
        :root { 
            --bg: #F4F1EA; 
            --clay: #E2725B; 
            --text: #1A1A1A; 
            --glass: rgba(255, 255, 255, 0.4); 
            --glass-deep: rgba(255, 255, 255, 0.6);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* View Management */
        .view { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            height: calc(100vh - 80px); 
            padding: 60px 20px 20px; 
            overflow-y: auto;
        }
        .view.active { display: flex; }

        header { 
            font-size: 11px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            opacity: 0.4; 
            margin-bottom: 25px; 
            font-weight: 600;
        }

        .card { 
            width: 100%; 
            max-width: 400px; 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border-radius: 35px; 
            padding: 40px 25px; 
            text-align: center; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.01);
            margin-bottom: 20px;
        }

        /* Typography */
        .ex-name { font-size: 26px; font-weight: 300; margin-bottom: 35px; letter-spacing: -0.5px; }
        .val { font-size: 56px; font-weight: 200; line-height: 1; }
        .unit { font-size: 10px; opacity: 0.4; text-transform: uppercase; margin-top: 4px; letter-spacing: 1px; }

        /* Steppers */
        .stepper-row { display: flex; justify-content: space-around; margin-bottom: 45px; }
        .stepper-group { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .btn-s { 
            background: var(--glass-deep); 
            border: none; 
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            font-size: 22px; 
            font-weight: 300;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Action Area */
        .action-zone { height: 160px; display: flex; align-items: center; justify-content: center; position: relative; }
        .log-circle { 
            width: 140px; 
            height: 140px; 
            background: var(--clay); 
            color: white; 
            border: none; 
            border-radius: 50%; 
            font-size: 15px; 
            font-weight: 600; 
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #timer-text { display: none; font-size: 48px; font-weight: 200; color: var(--clay); }

        /* Coach Form */
        textarea { 
            width: 100%; 
            height: 120px; 
            background: rgba(0,0,0,0.03); 
            border: none; 
            border-radius: 20px; 
            padding: 20px; 
            font-family: inherit; 
            font-size: 16px;
            margin-top: 15px;
            resize: none;
        }
        .save-btn { 
            margin-top: 25px; 
            padding: 15px 40px; 
            border-radius: 30px; 
            border: none; 
            background: var(--text); 
            color: var(--bg); 
            font-size: 14px; 
        }

        /* Nav Bar */
        nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: 85px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: var(--bg); 
            padding-bottom: 20px;
            border-top: 1px solid rgba(0,0,0,0.03);
        }
        .nav-btn { background: none; border: none; padding: 15px; opacity: 0.2; transition: opacity 0.3s; }
        .nav-btn.active { opacity: 1; }
        .icon { width: 10px; height: 10px; border: 1.5px solid var(--text); border-radius: 2px; }
        .icon-round { border-radius: 50%; }

        /* Status Toast */
        #next-info { margin-top: 30px; font-size: 11px; opacity: 0.4; letter-spacing: 1.5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="view-train" class="view active">
        <header id="loc-display">Gym</header>
        <div class="card">
            <div class="ex-name" id="exercise-name">Bench Press</div>
            <div class="stepper-row">
                <div class="stepper-group">
                    <button class="btn-s" onclick="adjust('w', 2.5)">+</button>
                    <div class="val" id="w-val">95</div>
                    <div class="unit">kg</div>
                    <button class="btn-s" onclick="adjust('w', -2.5)">−</button>
                </div>
                <div class="stepper-group">
                    <button class="btn-s" onclick="adjust('r', 1)">+</button>
                    <div class="val" id="r-val">8</div>
                    <div class="unit">reps</div>
                    <button class="btn-s" onclick="adjust('r', -1)">−</button>
                </div>
            </div>
            
            <div class="action-zone">
                <button class="log-circle" id="log-btn" onclick="executeLog()">LOG</button>
                <div id="timer-text">90</div>
            </div>
            
            <div id="next-info">Set 1</div>
        </div>
    </div>

    <div id="view-coach" class="view">
        <header>Profile & AI</header>
        <div class="card">
            <div style="font-size:13px; opacity:0.6; text-align:left; margin-left:10px;">Physical Limitations</div>
            <textarea id="injury-input" placeholder="Explain injuries in natural language..."></textarea>
            
            <div style="font-size:13px; opacity:0.6; text-align:left; margin-left:10px; margin-top:25px;">Equipment Profile</div>
            <textarea id="equip-input" placeholder="List available equipment (e.g. dumbbells, bench, rack)..."></textarea>
            
            <button class="save-btn" onclick="saveSettings()">Save Configuration</button>
            <button onclick="clearKey()" style="background:none; border:none; opacity:0.2; font-size:10px; margin-top:20px;">Reset API Key</button>
        </div>
    </div>

    <nav>
        <button class="nav-btn active" id="nav-train" onclick="switchView('train')"><div class="icon"></div></button>
        <button class="nav-btn" id="nav-coach" onclick="switchView('coach')"><div class="icon icon-round"></div></button>
    </nav>

    <script>
        // --- CORE DATA ---
        let state = {
            apiKey: localStorage.getItem('vis_key'),
            injuries: localStorage.getItem('vis_injuries') || "",
            equip: localStorage.getItem('vis_equip') || "Full Gym",
            setCount: 1
        };

        // Initialize API Key
        if (!state.apiKey) {
            state.apiKey = prompt("Paste Gemini API Key:");
            localStorage.setItem('vis_key', state.apiKey);
        }

        // --- UI LOGIC ---
        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            document.getElementById(`nav-${view}`).classList.add('active');
        }

        function adjust(type, amt) {
            const el = document.getElementById(`${type}-val`);
            let current = parseFloat(el.innerText);
            el.innerText = (current + amt).toFixed(1).replace('.0', '');
        }

        function saveSettings() {
            state.injuries = document.getElementById('injury-input').value;
            state.equip = document.getElementById('equip-input').value;
            localStorage.setItem('vis_injuries', state.injuries);
            localStorage.setItem('vis_equip', state.equip);
            alert("Coach Updated");
        }

        function clearKey() { localStorage.clear(); location.reload(); }

        // --- TIMER & AI LOGIC ---
        function runTimer(duration) {
            const btn = document.getElementById('log-btn');
            const txt = document.getElementById('timer-text');
            btn.style.display = 'none';
            txt.style.display = 'block';
            
            let time = duration;
            const clock = setInterval(() => {
                time--;
                txt.innerText = time;
                if (time <= 0) {
                    clearInterval(clock);
                    btn.style.display = 'block';
                    txt.style.display = 'none';
                    txt.innerText = duration;
                }
            }, 1000);
        }

        async function executeLog() {
            const weight = document.getElementById('w-val').innerText;
            const reps = document.getElementById('r-val').innerText;
            const info = document.getElementById('next-info');
            
            runTimer(90);
            info.innerText = "Coach Analyzing...";

            const sysPrompt = `You are a minimalist AI strength coach. 
            User Experience: 42yo, experienced.
            Limitations: ${state.injuries}.
            Equipment: ${state.equip}.
            Logic: Based on ${weight}kg x ${reps} at RPE 8, provide the next set.
            Output: JSON only {"w": float, "r": int, "ex": "string"}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: sysPrompt }] }] })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const result = JSON.parse(text);

                state.setCount++;
                info.innerText = `Next: ${result.w}kg x ${result.r}`;
                if(result.ex) document.getElementById('exercise-name').innerText = result.ex;

            } catch (e) {
                info.innerText = "Connection Error";
                console.error(e);
            }
        }

        // Fill inputs on load
        document.getElementById('injury-input').value = state.injuries;
        document.getElementById('equip-input').value = state.equip;

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=3');
        }
    </script>
</body>
</html>
