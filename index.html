<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Vis</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #F4F1EA; --clay: #E2725B; --text: #1A1A1A; --glass: rgba(255, 255, 255, 0.45); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        
        .view { display: none; flex-direction: column; height: 100vh; width: 100vw; padding: 60px 25px 100px; }
        .view.active { display: flex; }

        header { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.4; margin-bottom: 30px; text-align: center; font-weight: 700; }
        .card { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 35px; padding: 35px 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2); }
        
        /* Setup Flow */
        .setup-card { text-align: left; }
        .setup-card h1 { font-size: 24px; font-weight: 300; margin: 0 0 20px; }
        textarea { width: 100%; height: 120px; background: rgba(0,0,0,0.03); border: none; border-radius: 20px; padding: 20px; font-family: inherit; font-size: 16px; resize: none; }
        .btn-prime { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 20px; border-radius: 25px; font-size: 14px; margin-top: 20px; }

        /* Training UI */
        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .ex-name { font-size: 24px; font-weight: 300; letter-spacing: -0.5px; }
        .val { font-size: 64px; font-weight: 200; line-height: 1; }
        .unit { font-size: 10px; opacity: 0.4; text-transform: uppercase; margin-top: 5px; }
        .stepper { display: flex; justify-content: space-around; margin-bottom: 50px; }
        .s-btn { background: none; border: 1px solid rgba(0,0,0,0.08); width: 48px; height: 48px; border-radius: 50%; font-size: 20px; color: var(--text); display: flex; align-items: center; justify-content: center; }

        /* Action */
        .action-area { position: relative; height: 160px; display: flex; align-items: center; justify-content: center; }
        .log-circle { width: 140px; height: 140px; background: var(--clay); border: none; border-radius: 70px; color: white; font-weight: 600; font-size: 16px; letter-spacing: 1px; z-index: 2; }
        #rest-clock { display: none; font-size: 60px; font-weight: 100; color: var(--clay); }

        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--bg); display: none; justify-content: space-around; align-items: center; padding-bottom: 25px; border-top: 1px solid rgba(0,0,0,0.03); }
        nav.on { display: flex; }
        .nav-l { background: none; border: none; opacity: 0.2; transition: 0.3s; padding: 10px; }
        .nav-l.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="view-setup" class="view active">
        <header>Setup</header>
        <div class="card setup-card" id="s1">
            <h1>Injuries?</h1>
            <textarea id="in-injuries" placeholder="List any limitations..."></textarea>
            <button class="btn-prime" onclick="go(2)">Next</button>
        </div>
        <div class="card setup-card" id="s2" style="display:none">
            <h1>Equipment?</h1>
            <textarea id="in-equip" placeholder="Dumbbells, Rack, Bench..."></textarea>
            <button class="btn-prime" onclick="finish()">Start Training</button>
        </div>
    </div>

    <div id="view-train" class="view">
        <header id="loc-label">Gym</header>
        <div class="card">
            <div class="ex-header">
                <div class="ex-name" id="cur-ex">Bench Press</div>
                <button onclick="swapEx()" style="background:none; border:none; opacity:0.3;"><i data-lucide="refresh-cw" size="18"></i></button>
            </div>
            <div class="stepper">
                <div style="text-align:center"><button class="s-btn" onclick="adj('w',2.5)">+</button><div class="val" id="w-v">95</div><div class="unit">kg</div><button class="s-btn" onclick="adj('w',-2.5)">-</button></div>
                <div style="text-align:center"><button class="s-btn" onclick="adj('r',1)">+</button><div class="val" id="r-v">8</div><div class="unit">reps</div><button class="s-btn" onclick="adj('r',-1)">-</button></div>
            </div>
            <div class="action-area">
                <button class="log-circle" id="log-btn" onclick="log()">LOG</button>
                <div id="rest-clock">90</div>
            </div>
            <div id="ai-status" style="margin-top:30px; font-size:11px; opacity:0.3; text-align:center; letter-spacing:1px">SET 1</div>
        </div>
    </div>

    <div id="view-settings" class="view">
        <header>Settings</header>
        <div class="card">
            <div style="font-size:11px; opacity:0.5; margin-bottom:10px">GEMINI API KEY</div>
            <input type="password" id="api-in" style="width:100%; padding:15px; border-radius:15px; border:1px solid rgba(0,0,0,0.1); background:none">
            <button class="btn-prime" onclick="saveKey()">Update Key</button>
            <button onclick="localStorage.clear();location.reload()" style="margin-top:40px; background:none; border:none; color:red; opacity:0.4; width:100%; font-size:11px">WIPE DATA</button>
        </div>
    </div>

    <nav id="navbar">
        <button class="nav-l" onclick="tab('train',this)"><i data-lucide="dumbbell"></i></button>
        <button class="nav-l" onclick="tab('settings',this)"><i data-lucide="settings"></i></button>
    </nav>

    <script>
        let db = {
            key: localStorage.getItem('v_key'),
            done: localStorage.getItem('v_done'),
            inj: localStorage.getItem('v_inj'),
            eq: localStorage.getItem('v_eq')
        };

        function go(s) { document.getElementById('s1').style.display='none'; document.getElementById('s2').style.display='block'; }
        
        function finish() {
            db.key = db.key || prompt("Paste Gemini API Key:");
            db.inj = document.getElementById('in-injuries').value;
            db.eq = document.getElementById('in-equip').value;
            localStorage.setItem('v_key', db.key);
            localStorage.setItem('v_inj', db.inj);
            localStorage.setItem('v_eq', db.eq);
            localStorage.setItem('v_done', true);
            location.reload();
        }

        if(db.done) {
            document.getElementById('view-setup').classList.remove('active');
            document.getElementById('view-train').classList.add('active');
            document.getElementById('navbar').classList.add('on');
            document.getElementById('api-in').value = db.key;
        }

        function tab(v, b) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-l').forEach(x => x.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            b.classList.add('active');
        }

        function adj(t, n) { let el = document.getElementById(t+'-v'); el.innerText = (parseFloat(el.innerText)+n).toFixed(1).replace('.0',''); }

        async function ai(prompt) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${db.key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const d = await res.json();
            return JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
        }

        async function log() {
            const btn = document.getElementById('log-btn');
            const clock = document.getElementById('rest-clock');
            const status = document.getElementById('ai-status');
            btn.style.display='none'; clock.style.display='block';
            
            let t = 90;
            const timer = setInterval(() => {
                t--; clock.innerText = t;
                if(t<=0) { clearInterval(timer); btn.style.display='block'; clock.style.display='none'; clock.innerText=90; }
            }, 1000);

            status.innerText = "COACH ANALYZING...";
            const p = `User: 42yo experienced. Injuries: ${db.inj}. Did ${document.getElementById('w-v').innerText}kg x ${document.getElementById('r-v').innerText} RPE 8. Next set? JSON ONLY: {"w":float, "r":int}`;
            try {
                const res = await ai(p);
                status.innerText = `NEXT: ${res.w}kg x ${res.r}`;
            } catch(e) { status.innerText = "OFFLINE"; }
        }

        async function swapEx() {
            const cur = document.getElementById('cur-ex').innerText;
            const p = `Swap ${cur}. Gear: ${db.eq}. Suggest 1 alternative. JSON ONLY: {"n":"string"}`;
            try {
                const res = await ai(p);
                document.getElementById('cur-ex').innerText = res.n;
            } catch(e) {}
        }

        function saveKey() { localStorage.setItem('v_key', document.getElementById('api-in').value); location.reload(); }
        lucide.createIcons();
    </script>
</body>
</html>
