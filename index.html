<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Form | Strategic Strength</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #F4F1EA; --clay: #E2725B; --moss: #4A5D4E; --text: #1A1A1A; 
            --border: rgba(0,0,0,0.1); --card: #FFFFFF;
            --mono: 'SF Mono', 'Fira Code', monospace; --serif: "Georgia", serif;
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        h1 { font-family: var(--serif); font-size: 26px; font-weight: 300; margin: 0; }
        .view { display: none; flex-direction: column; height: 100vh; padding: 40px 20px 100px; overflow-y: auto; }
        .view.active { display: flex; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: white; display: none; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); padding-bottom: 25px; z-index: 1000; }
        nav.visible { display: flex; }
        .nav-item { background: none; border: none; opacity: 0.3; text-align: center; font-size: 9px; font-weight: 700; flex: 1; color: var(--text); cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--moss); }
        input, textarea { width: 100%; background: #F9F9F8; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: var(--mono); font-size: 14px; margin-bottom: 10px; color: var(--text); }
        .btn { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 16px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; }
        .num { font-family: var(--mono); font-weight: 600; }
        .err-msg { background: #FFF0ED; color: #E2725B; padding: 10px; border-radius: 8px; font-family: var(--mono); font-size: 11px; margin-top: 10px; white-space: pre-wrap; }
        
        /* Log specifics */
        .ex-content { display: block; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .set-node { width: 42px; height: 42px; border-radius: 8px; background: #EEE; display: inline-flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 800; margin: 4px; }
        .set-node.done { background: var(--moss); color: white; }
    </style>
</head>
<body>

    <div id="v-setup" class="view active">
        <div class="card">
            <h1>Initial Set Up</h1>
            <div id="setup-content">
                <label style="display:block; font-size:10px; font-weight:800; margin-bottom:5px">GEMINI API KEY</label>
                <input type="password" id="init-key" placeholder="Paste Key Here">
                <button class="btn" onclick="UI.start()">Connect AI Trainer</button>
            </div>
            <div id="setup-err"></div>
        </div>
    </div>

    <div id="v-log" class="view">
        <h1 id="day-title">Today's Session</h1>
        <div id="log-mount" style="margin-top:20px"></div>
        <button class="btn" style="background:var(--moss); margin-top:20px" onclick="UI.finish()">Complete Session</button>
    </div>

    <div id="v-prog" class="view">
        <h1>Program</h1>
        <div id="prog-mount" style="margin-top:20px"></div>
    </div>

    <div id="v-set" class="view">
        <h1>Settings</h1>
        <div class="card" style="margin-top:20px">
            <button class="btn" style="background:var(--clay)" onclick="localStorage.clear(); location.reload();">Hard Reset App</button>
        </div>
    </div>

    <nav id="nav-bar">
        <button class="nav-item active" onclick="UI.tab('log', this)"><i data-lucide="clipboard-list"></i><br>Log</button>
        <button class="nav-item" onclick="UI.tab('prog', this)"><i data-lucide="calendar"></i><br>Program</button>
        <button class="nav-item" onclick="UI.tab('set', this)"><i data-lucide="sliders"></i><br>Settings</button>
    </nav>

    <script>
    // --- APP DATA ---
    const APP = {
        data: {
            key: localStorage.getItem('f_key') || '',
            profile: JSON.parse(localStorage.getItem('f_prof')) || {},
            program: JSON.parse(localStorage.getItem('f_prog')) || []
        },
        active: null
    };

    // --- UI ACTIONS ---
    const UI = {
        async start() {
            const key = document.getElementById('init-key').value.trim();
            if(!key) return;
            APP.data.key = key;
            localStorage.setItem('f_key', key);
            
            const mount = document.getElementById('setup-content');
            mount.innerHTML = `<p style="font-family:var(--mono); font-size:12px; opacity:0.5">ESTABLISHING LINK...</p>`;
            
            try {
                const res = await this.aiTalk("Introduce yourself and ask questions to build my strength profile.");
                mount.innerHTML = `
                    <div style="font-size:14px; line-height:1.6; margin-bottom:20px;">${res.text}</div>
                    <textarea id="ob-ans" placeholder="Your reply..."></textarea>
                    <button class="btn" onclick="UI.onboardNext()">Submit</button>
                `;
            } catch (e) {
                document.getElementById('setup-err').innerHTML = `<div class="err-msg">Connection Error: ${e.message}</div>`;
                mount.innerHTML = `<input type="password" id="init-key" placeholder="Paste Key"><button class="btn" onclick="UI.start()">Retry</button>`;
            }
        },

        async onboardNext() {
            const ans = document.getElementById('ob-ans').value;
            const mount = document.getElementById('setup-content');
            mount.innerHTML = `<p style="font-family:var(--mono); font-size:12px; opacity:0.5">COMPUTING PROGRAM...</p>`;
            
            try {
                const res = await this.aiTalk(ans + " Build my profile and program JSON. COMMAND: {\"type\":\"SET_PROG\", \"data\": [...], \"profile\": {...}}");
                if(res.cmd) {
                    APP.data.program = res.cmd.data;
                    APP.data.profile = res.cmd.profile;
                    localStorage.setItem('f_prog', JSON.stringify(res.cmd.data));
                    localStorage.setItem('f_prof', JSON.stringify(res.cmd.profile));
                    location.reload();
                } else {
                    mount.innerHTML = `<div style="font-size:14px; margin-bottom:20px;">${res.text}</div><textarea id="ob-ans"></textarea><button class="btn" onclick="UI.onboardNext()">Submit</button>`;
                }
            } catch (e) {
                document.getElementById('setup-err').innerHTML = `<div class="err-msg">${e.message}</div>`;
            }
        },

        async aiTalk(msg) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${APP.data.key}`;
            const prompt = `System: You are the AI Strength Trainer. Context: ${JSON.stringify(APP.data.profile)}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt + " Trainee: " + msg }] }] })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error ? err.error.message : "Handshake Failed");
            }

            const data = await response.json();
            const raw = data.candidates[0].content.parts[0].text;
            return {
                text: raw.split('COMMAND:')[0],
                cmd: raw.includes('COMMAND:') ? JSON.parse(raw.split('COMMAND:')[1].trim()) : null
            };
        },

        tab(t, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('v-' + t).classList.add('active');
            el.classList.add('active');
            if(t === 'prog') this.renderProg();
        },

        renderLog() {
            if(!APP.data.program.length) return;
            const day = APP.data.program[0];
            document.getElementById('day-title').innerText = day.name;
            document.getElementById('log-mount').innerHTML = day.ex.map((ex, i) => `
                <div class="card">
                    <div style="font-family:var(--serif); font-size:18px;">${ex.name}</div>
                    <div class="num" style="font-size:12px; opacity:0.5">${ex.s}x${ex.r} @ ${ex.w}kg</div>
                    <div class="ex-content">
                        ${Array(parseInt(ex.s)).fill(0).map((_, s) => `<div class="set-node">${s+1}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        },

        renderProg() {
            document.getElementById('prog-mount').innerHTML = APP.data.program.map(d => `
                <div class="card">
                    <div style="font-family:var(--serif); font-size:18px; color:var(--moss)">${d.name}</div>
                    ${d.ex.map(e => `<div style="display:flex; justify-content:space-between; padding:5px 0; font-size:13px; border-bottom:1px solid #f0f0f0"><span>${e.name}</span><span class="num">${e.s}x${e.r} @ ${e.w}kg</span></div>`).join('')}
                </div>
            `).join('');
        },

        finish() {
            alert("Session recorded. This would normally sync to history.");
            location.reload();
        }
    };

    // --- BOOT ---
    window.addEventListener('DOMContentLoaded', () => {
        if(APP.data.key && APP.data.program.length > 0) {
            document.getElementById('v-setup').classList.remove('active');
            document.getElementById('v-log').classList.add('active');
            document.getElementById('nav-bar').classList.add('visible');
            UI.renderLog();
        }
        lucide.createIcons();
    });
    </script>
</body>
</html>
